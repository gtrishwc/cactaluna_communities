<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Reportes | Cacta Luna Communities</title>

<link rel="stylesheet" href="../style.css">

</head>


<body>

<div class="main">


<header class="topbar">

<div>

<h1>📝 Crear Reporte</h1>

<p>Real de Palmas • Atención a residentes</p>

</div>


<div class="profile">

<div class="avatar">
G
</div>

<div>

<strong>Giovanna</strong><br>

Residente

</div>

</div>

</header>



<div class="panel">


<h2>Nuevo reporte</h2>


<form>


<label>
Categoría
</label>


<select>

<option>💡 Alumbrado</option>

<option>🚰 Agua</option>

<option>🚗 Vehículo</option>

<option>🔊 Ruido</option>

<option>🛠 Mantenimiento</option>

</select>



<label>
Descripción
</label>


<textarea 
placeholder="Describe el problema..."
rows="5">
</textarea>



<label>
Prioridad
</label>


<div class="prioridad">


<label>
<input type="radio" name="prioridad">
Baja
</label>


<label>
<input type="radio" name="prioridad">
Media
</label>


<label>
<input type="radio" name="prioridad">
Urgente
</label>


</div>



<button class="btn">

Enviar reporte

</button>


</form>


</div>


</div>


</body>

</html>
