<div class="main">


<header class="topbar">

<div>

<h1>📝 Crear Reporte</h1>

<p>Real de Palmas • Atención a residentes</p>

</div>


<div class="profile">

<div class="avatar">
G
</div>

<div>

<strong>Giovanna</strong><br>

Residente

</div>

</div>

</header>



<div class="panel">


<h2>Nuevo reporte</h2>


<form>


<label>
Categoría
</label>


<select>

<option>💡 Alumbrado</option>

<option>🚰 Agua</option>

<option>🚗 Vehículo</option>

<option>🔊 Ruido</option>

<option>🛠 Mantenimiento</option>

</select>



<label>
Descripción
</label>


<div class="campo">

<label>
📷 Evidencia fotográfica
</label>
<div class="campo">

<label>
📍 Ubicación
</label>

<input 
type="text"
id="ubicacion"
placeholder="Ejemplo: Calle Palma Real #25"
>

</div>

  
<input 
type="file" 
id="foto"
accept="image/*"
>

</div>



<label>
Prioridad
</label>


<div class="prioridad">


<label>
<input type="radio" name="prioridad">
Baja
</label>


<label>
<input type="radio" name="prioridad">
Media
</label>


<label>
<input type="radio" name="prioridad">
Urgente
</label>


</div>



<button 
class="btn" 
onclick="enviarReporte()">
📨 Enviar reporte
</button>


</form>


</div>


</div>


</body>

<script>

const URL_APP_SCRIPT = "https://script.google.com/macros/s/AKfycbxpXc9n-_RmhQfEw3DQXmHV5Udcq-03ZOmjmt_cSItq1PQv-D5WRS6TCsAWEgulcBw9Bw/exec";


function enviarReporte(){


let datos = {

tipo: document.getElementById("tipo").value,

descripcion: document.getElementById("descripcion").value,

ubicacion: document.getElementById("ubicacion").value,

prioridad: document.querySelector('input[name="prioridad"]:checked')?.value || "Normal"


};


fetch(URL_APP_SCRIPT, {

method:"POST",

body:JSON.stringify(datos)

})


.then(res => res.text())

.then(respuesta => {


console.log(respuesta);


alert("✅ Reporte enviado correctamente");


})


.catch(error=>{


console.error(error);


alert("❌ Error al enviar reporte");


});


}


</script>
