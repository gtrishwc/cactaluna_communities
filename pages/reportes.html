<div>

<p>Real de Palmas • Atención a residentes</p>

<div class="profile">

<div class="avatar">
G

<div>

<form>


<label>
Categoría

<option>🚰 Agua</option>

<div class="campo">

<label>

</label>

<label>
📍 Ubicación
</label>

<input 
type="text"
id="ubicacion"

>

</div>

  
<input 
type="file" 
id="foto"
accept="image/*"
>

</div>

Prioridad
</label>

<label>
<input type="radio" name="prioridad">
Baja
</label>


<label>

Media
</label>


<label>
<input type="radio" name="prioridad">
Urgente
</label>


</div>



<button 
class="btn" 
onclick="enviarReporte()">

</button>


</form>


</div>

<script>

alert("🚀 El botón funciona");

let tipo = document.getElementById("tipo")?.value;

}
